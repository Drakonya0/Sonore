<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracks - Music Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <div class="navbar-logo-icon">🎵</div>
      <span>Sonore</span>
    </a>
    <nav>
      <a href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="artists.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Artistes
      </a>
      <a href="albums.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
        Albums
      </a>
      <a href="tracks.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Tracks
      </a>
    </nav>
  </nav>

  <div class="page">
    <header><h1>Top Tracks</h1></header>

    <!-- STATS ROW -->
    <div class="stats-grid" style="margin-bottom:32px">
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-label">Tracks</div>
          <div class="stat-icon">🎵</div>
        </div>
        <div class="stat-value" id="totalTracks">—</div>
        <div class="stat-sub">Dans le top</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-label">Total Scrobbles</div>
          <div class="stat-icon">📊</div>
        </div>
        <div class="stat-value" id="totalScrobbles">—</div>
        <div class="stat-sub">Sur ces tracks</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-label">Moyenne</div>
          <div class="stat-icon">🎯</div>
        </div>
        <div class="stat-value" id="avgPlays">—</div>
        <div class="stat-sub">Plays / track</div>
      </div>
    </div>

    <!-- TRACKS LIST -->
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:40px" id="tracksGrid"></div>

    <!-- CHART -->
    <div class="card" style="max-width:100%">
      <h2>Plays par track</h2>
      <canvas id="tracksChart" style="margin-top:16px"></canvas>
    </div>

  </div>

  <script src="tracks.js"></script>
</body>
</html>
